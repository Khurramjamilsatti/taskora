services:
  backend:
    build:
      context: ./backend
    image: taskora-backend:latest
    container_name: taskora-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - backend_storage:/var/www/html/storage
    expose:
      - "80"
    networks:
      - taskora

  frontend:
    build:
      context: ./frontend
    image: taskora-frontend:latest
    container_name: taskora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - taskora

networks:
  taskora:
    driver: bridge

volumes:
  backend_storage:
