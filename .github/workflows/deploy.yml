# Manual redeploy only. Automatic deploy runs inside ci.yml on every push to main.
name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$SSH_HOST" ]; then
            echo "::error::SSH_HOST is empty."
            missing=1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "::error::SSH_USER is empty."
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY is empty. Paste the passphrase-free private key."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve image name
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/taskora-app" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/taskora}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            git pull --ff-only || echo "git pull skipped"

            export APP_IMAGE="${IMAGE}:latest"
            docker compose pull app
            docker compose up -d --no-build --remove-orphans

            docker logout ghcr.io
            docker image prune -f

            echo "Deployed ${APP_IMAGE}"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ steps.image.outputs.name }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
