name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deployments at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/taskora-app" >> "$GITHUB_OUTPUT"

      - name: Verify access token
        env:
          DEPLOY_ACCESS_TOKEN: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
        run: |
          if [ -z "$DEPLOY_ACCESS_TOKEN" ]; then
            echo "::error::DEPLOY_ACCESS_TOKEN is empty."
            echo "::error::Create a GitHub PAT (classic) with write:packages, read:packages, and repo scopes,"
            echo "::error::then add it as repository secret DEPLOY_ACCESS_TOKEN."
            exit 1
          fi
          echo "DEPLOY_ACCESS_TOKEN is set."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DEPLOY_ACCESS_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS runner
    needs: build-and-push
    # Runs ON the VPS via a self-hosted GitHub Actions runner (no SSH, no webhook).
    runs-on: self-hosted
    steps:
      - name: Pull and restart app
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.image }}:latest
          DEPLOY_ACCESS_TOKEN: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          cd "${DEPLOY_PATH:-$HOME/taskora}"

          echo "$DEPLOY_ACCESS_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          export APP_IMAGE
          docker compose pull app
          docker compose up -d --no-build --remove-orphans

          docker logout ghcr.io
          docker image prune -f

          echo "Deployed ${APP_IMAGE}"
