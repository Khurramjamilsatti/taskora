name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deployments at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/taskora-app" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify webhook secrets
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          missing=0
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "::error::DEPLOY_WEBHOOK_URL is empty. Example: http://YOUR_VPS_IP:9100/deploy"
            missing=1
          fi
          if [ -z "$DEPLOY_WEBHOOK_SECRET" ]; then
            echo "::error::DEPLOY_WEBHOOK_SECRET is empty. Must match DEPLOY_WEBHOOK_SECRET in the VPS .env"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Webhook secrets are present."

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          payload=$(jq -n \
            --arg image "${IMAGE}:latest" \
            --arg ghcr_user "$GHCR_USER" \
            --arg ghcr_token "$GHCR_TOKEN" \
            '{image:$image, ghcr_user:$ghcr_user, ghcr_token:$ghcr_token}')

          echo "Calling deploy webhook for ${IMAGE}:latest"
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            --connect-timeout 15 \
            --max-time 300 \
            "$DEPLOY_WEBHOOK_URL"

          echo
          echo "Deploy webhook accepted."
