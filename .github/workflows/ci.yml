name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  backend:
    name: Validate backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, intl, zip
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Boot check
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          php artisan route:list >/dev/null

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      pushed: ${{ steps.meta.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/taskora-app" >> "$GITHUB_OUTPUT"

      - name: Decide whether to push
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/taskora-app"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            # Local-only tag for PR validation (never pushed)
            echo "tags=taskora-app:ci" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            # Only GHCR tags — a bare "taskora-app:ci" would push to Docker Hub
            {
              echo "tags<<EOF"
              echo "${image}:latest"
              echo "${image}:${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.pushed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.pushed == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [frontend, backend, docker]
    # Only on main (push or manual), after image was pushed — never on PRs
    if: >
      always() &&
      needs.frontend.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.docker.result == 'success' &&
      needs.docker.outputs.pushed == 'true' &&
      (github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$SSH_HOST" ]; then
            echo "::error::SSH_HOST is empty (VPS IP or hostname)."
            missing=1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "::error::SSH_USER is empty (SSH login user)."
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY is empty."
            echo "::error::Create a passphrase-free key and paste the PRIVATE key into this secret."
            echo "::error::See DEPLOY.md → 'CI deploy key setup'."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # Password auth is often disabled on VPS images. Use a passphrase-free
      # deploy key instead (DEPLOY_SSH_KEY).
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/taskora}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            git pull --ff-only || echo "git pull skipped"

            export APP_IMAGE="${IMAGE}:latest"
            docker compose pull app
            docker compose up -d --no-build --remove-orphans

            docker logout ghcr.io
            docker image prune -f

            echo "Deployed ${APP_IMAGE}"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ needs.docker.outputs.image }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
