user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;

    # Server block(s) are generated at runtime by the entrypoint
    # (HTTP-only or HTTP+HTTPS depending on ENABLE_SSL).
    include /etc/nginx/conf.d/taskora.conf;
}
