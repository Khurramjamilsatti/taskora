# Shared application routing, included inside each server block.
# Serves the Vue SPA and routes /api (+ /up) to Laravel via php-fpm.

root /var/www/frontend;
index index.html;

# API requests are handled by the Laravel front controller (php-fpm)
location /api {
    try_files $uri @laravel;
}

# Laravel health check endpoint
location = /up {
    try_files $uri @laravel;
}

location @laravel {
    fastcgi_pass 127.0.0.1:9000;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    fastcgi_hide_header X-Powered-By;
}

# Cache built static assets aggressively
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# SPA fallback
location / {
    try_files $uri $uri/ /index.html;
}
